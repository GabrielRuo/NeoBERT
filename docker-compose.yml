services:
  modal-like:
    image: neobert-dev:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEOBERT_EXTRAS: "dev,modal,train_base"
        TORCH_BACKEND: "cpu"
    container_name: neobert_modal_local
    # Mount full repo root for cleaner access (includes .git for commits)
    # /data and /runs are kept as separate mounts to mirror Modal volume semantics
    volumes:
      - .:/workspace:rw
      - ./data:/data:rw # to mimic Modal's /runs for easier local/Modal parity
      - ./runs:/runs:rw # to mimic Modal's /runs for easier local/Modal parity
      - ~/.ssh:/root/.ssh:ro
      - ~/.gitconfig:/root/.gitconfig:ro
      - ${HOME}/.modal.toml:/root/.modal.toml:ro
      - ~/.cache/pip:/root/.cache/pip:rw
    env_file: # directly inject environment variables from .env, which is gitignored and should contain actual credentials
      - .env
    environment:
      TRANSFORMERS_OFFLINE: "0"
      HF_HUB_OFFLINE: "0"
      HF_DATASETS_OFFLINE: "0"
      WANDB_MODE: "offline"
      HF_HOME: "/workspace/cache/hf"
      TRANSFORMERS_CACHE: "/workspace/cache/hf"
      # convenience override for trainer default path
      TRAINER_CHECKPOINT_DIR: "/runs/checkpoints"
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
volumes:
  runs:
  data:
  cache_hf: