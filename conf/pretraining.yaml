defaults:
  - _self_
  - dataset: minipile
  - tokenizer: google_mini
  - model:
    - neobert
    - 250M-opt
    - mop
  - optimizer: adamw
  - scheduler: cosine_decay
  - trainer:
    - mlm
    - losses
  - dataloader: dataloader_pathways
  - datacollator: mlm_15

seed: 0

modal:
  run_on_modal: false

hydra:
  run:
    dir: logs/hydra

wandb:
  resume: never
  name: null
  project: MoP
  entity: g-ruault-centralesup-lec
  tags: []
  dir: logs/wandb
  mode: online
  log_interval: 100



