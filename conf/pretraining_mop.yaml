defaults:
  - _self_
  - dataset: minipile
  - tokenizer: google_mini
  - model: 
    - neobert
    - architecture_mop
    - mop
  - optimizer: adamw
  - scheduler: cosine_decay
  - trainer: 
    - mlm
  - dataloader: CRAMMINGdataloader
  - datacollator: mlm_15

seed: 0

hydra:
  run:
    dir: logs/hydra

wandb:
  resume: never
  name: null
  project: MoP
  entity: gabriel-ruault-centralesup-lec
  tags: []
  dir: logs/wandb #unused and overwritten by trainer log dir
  mode: online
  log_interval: 100

test:
  max_steps: 10 #1000
  buffer_size_seq: 100 #10000
  buffer_size_token: 100 #10000



