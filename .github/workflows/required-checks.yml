name: Required Checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  repo-policy:
    name: repo policy files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify governance files exist
        run: |
          test -s .github/CODEOWNERS
          test -s .pre-commit-config.yaml

  pre-commit:
    name: pre-commit (changed files)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit on PR changes
        run: |
          pre-commit run --show-diff-on-failure --color=always \
            --from-ref "${{ github.event.pull_request.base.sha }}" \
            --to-ref "${{ github.event.pull_request.head.sha }}"
